name: headless-wp

services:
  db:
    image: mariadb:10.11
    container_name: headless-wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: somewordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net

  frontend:
    build: ./frontend
    container_name: headless-wp-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_WP_URL=http://localhost
    depends_on:
      - nginx
    networks:
      - wp_net

  nginx:
    image: nginx:alpine
    container_name: headless-wp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../wordpress:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - wp_net

  php-fpm:
    build: ./php-fpm
    container_name: headless-wp-php-fpm
    restart: always
    volumes:
      - ../wordpress:/var/www/html
    depends_on:
      - db
    networks:
      - wp_net

  # Dedicated WP-CLI service for running admin commands
  wp-cli:
    image: wordpress:cli-php8.2
    container_name: headless-wp-wp-cli
    restart: "no"  # only run when manually executed
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../wordpress:/var/www/html
    depends_on:
      - db
      - php-fpm
    networks:
      - wp_net
    command: tail -f /dev/null

networks:
  wp_net:
    driver: bridge

volumes:
  db_data:
    name: headless-wp-db-data
  wordpress_uploads:
    name: headless-wp-wp-uploadsw