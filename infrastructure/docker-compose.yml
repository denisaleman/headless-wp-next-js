name: headless-wp

services:
  db:
    image: mariadb:10.11
    container_name: headless-wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: somewordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net

  php-fpm:
    build: ./php-fpm
    container_name: headless-wp-php-fpm
    restart: always
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
    depends_on:
      - db
    networks:
      - wp_net

  nginx:
    image: nginx:alpine
    container_name: headless-wp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - wp_net

  frontend:
    build: ./frontend
    container_name: headless-wp-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_WP_URL=http://localhost
    depends_on:
      - nginx
    networks:
      - wp_net

  # Dedicated WP-CLI service for running admin commands
  wp-cli:
    image: wordpress:cli-php8.2
    container_name: headless-wp-wp-cli
    restart: "no"  # only run when manually executed
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
    depends_on:
      - db
      - php-fpm
    networks:
      - wp_net
    command: tail -f /dev/null

  setup:
    build: ./setup
    container_name: headless-wp-setup
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=wordpress
      - DB_USER=wordpress
      - DB_PASSWORD=wordpress
      - WP_URL=${WP_URL:-http://localhost}
      - WP_TITLE=${WP_TITLE:-Headless WordPress}
      - WP_ADMIN_USER=${WP_ADMIN_USER:-admin}
      - WP_ADMIN_PASSWORD=${WP_ADMIN_PASSWORD:-admin}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL:-admin@example.com}
      - WP_PERMALINK_STRUCTURE=${WP_PERMALINK_STRUCTURE:-/%postname%/}
      - WP_AUTO_INSTALL=${WP_AUTO_INSTALL:-true}
      - WP_SET_PERMALINKS=${WP_SET_PERMALINKS:-true}
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
    depends_on:
      - db
      - php-fpm
    networks:
      - wp_net
    command: tail -f /dev/null

networks:
  wp_net:
    driver: bridge

volumes:
  db_data:
    name: headless-wp-db-data
  wordpress_uploads:
    name: headless-wp-wp-uploads