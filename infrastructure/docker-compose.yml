name: headless-wp

services:
  db:
    image: mysql:8.0
    container_name: headless-wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: somewordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql

  php:
    build: ./php-fpm
    container_name: headless-wp-php
    restart: always
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
    depends_on:
      - db
    environment:
      # PHP-FPM can also read environment variables if needed (e.g., for DB config)
      # But Bedrock uses .env file, so no need.
      - PHP_FPM_LISTEN=9000

  nginx:
    image: nginx:alpine
    container_name: headless-wp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../wordpress:/var/www/html          # static files access (read-only for nginx)
      - wordpress_uploads:/var/www/html/web/app/uploads
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  db_data:
    name: headless-wp-db-data
  wordpress_uploads:
    name: headless-wp-wp-uploads