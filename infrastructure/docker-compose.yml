name: headless-wp

services:
  db:
    image: mysql:8.0
    container_name: headless-wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: somewordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql

  php-fpm:
    build: ./php-fpm
    container_name: headless-wp-php-fpm
    restart: always
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: headless-wp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../wordpress:/var/www/html
      - wordpress_uploads:/var/www/html/web/app/uploads
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  frontend:
    build: ./frontend
    container_name: headless-wp-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules   # anonymous volume to persist node_modules across mounts
    environment:
      - NEXT_PUBLIC_WP_URL=http://nginx
    depends_on:
      - nginx

volumes:
  db_data:
    name: headless-wp-db-data
  wordpress_uploads:
    name: headless-wp-wp-uploads